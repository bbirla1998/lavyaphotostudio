<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Lavya Photo Studio</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-header {
            padding: 150px 0 60px;
            text-align: center;
            background: linear-gradient(to bottom, var(--bg-color), var(--card-bg));
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding: 80px 0;
            align-items: center;
        }

        .about-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .about-text h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .about-text p {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        @media(max-width: 768px) {
            .about-content {
                grid-template-columns: 1fr;
            }

            .about-image {
                height: 300px;
            }
        }

        .team-section {
            padding: 60px 0 20px;
            text-align: center;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .team-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform var(--transition-speed);
        }

        .team-card:hover {
            transform: translateY(-5px);
        }

        .team-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid var(--accent-gold);
        }

        .team-card h3 {
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .team-card p {
            color: var(--accent-gold);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="/" class="nav-brand studio-name-display">Lavya Studio</a>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/services.html">Services</a></li>
            <li><a href="/gallery.html">Gallery</a></li>
            <li><a href="/offers.html">Offers</a></li>
            <li><a href="/about.html" class="active">About</a></li>
            <li><a href="/contact.html">Contact</a></li>
            <li><a href="/admin.html" title="Admin Portal" style="display:flex; align-items:center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-top:-2px;">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                        </path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                </a></li>
        </ul>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 style="font-size: 3rem;">About <span class="gold-text">Us</span></h1>
        </div>
    </header>

    <section class="container">
        <div class="about-content">
            <img id="aboutImage" src="" alt="Photographer" class="about-image">
            <div class="about-text">
                <h2 id="aboutHeadline">Loading...</h2>
                <div id="aboutDescription">
                    <!-- Paragraphs populated by JS -->
                </div>
                <div style="margin-top: 30px;">
                    <a href="/gallery.html" class="btn">View Our Work</a>
                </div>
            </div>
        </div>

        <div class="team-section">
            <h2>Meet Our <span class="gold-text">Team</span></h2>
            <div class="team-grid" id="teamGrid">
                <!-- Dynamically populated -->
            </div>
        </div>

    </section>

    <!-- Minimal Footer -->
    <footer style="padding: 20px 0; text-align: center; border-top: 1px solid rgba(255,255,255,0.1);">
        &copy; <span id="year"></span> <span class="studio-name-display"></span>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        async function initAbout() {
            try {
                const res = await fetch('/api/data/settings');
                const settings = await res.json();
                const about = settings.about || {};

                if (about.headline) {
                    // Split headline to add gold span to the last word if it's "Emotions" or similar
                    const parts = about.headline.split(' ');
                    const last = parts.pop();
                    document.getElementById('aboutHeadline').innerHTML = `${parts.join(' ')} <span class="gold-text">${last}</span>`;
                }

                if (about.imageUrl) {
                    document.getElementById('aboutImage').src = about.imageUrl;
                }

                if (about.description) {
                    const descContainer = document.getElementById('aboutDescription');
                    descContainer.innerHTML = '';
                    const paragraphs = about.description.split('\n');
                    paragraphs.forEach(p => {
                        if (p.trim()) {
                            const pTag = document.createElement('p');
                            pTag.innerHTML = p.replace(/Lavya Studio/g, '<strong class="studio-name-display">Lavya Studio</strong>');
                            descContainer.appendChild(pTag);
                        }
                    });
                }

                if (about.team && about.team.length > 0) {
                    const teamGrid = document.getElementById('teamGrid');
                    teamGrid.innerHTML = '';
                    about.team.forEach(member => {
                        const card = document.createElement('div');
                        card.className = 'team-card';
                        card.innerHTML = `
                            <img src="${member.image}" alt="${member.name}">
                            <h3>${member.name}</h3>
                            <p>${member.role}</p>
                        `;
                        teamGrid.appendChild(card);
                    });
                }
            } catch (err) {
                console.error('Error loading About data:', err);
            }
        }
        initAbout();
    </script>
</body>

</html>
