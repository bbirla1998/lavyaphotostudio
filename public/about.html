<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Lavya Photo Studio</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .about-image {
            width: 100%;
            height: auto;
            min-height: 300px;
            max-height: 500px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(212, 175, 55, 0.2);
        }

        .team-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all var(--transition-speed);
            text-align: center;
        }

        .team-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .team-card img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 25px;
            border: 3px solid var(--accent-gold);
            padding: 5px;
        }
    </style>
</head>

<body>

    <div id="navbar-placeholder"></div>

    <header class="page-header">
        <div class="container">
            <h1 class="display-3 fw-bold">About <span class="gold-text">Us</span></h1>
        </div>
    </header>

    <section class="section py-5">
        <div class="container">
        <div class="row g-4 align-items-center mb-5 pb-5">
            <div class="col-lg-6">
                <img id="aboutImage" src="" alt="Photographer" class="about-image img-fluid">
            </div>
            <div class="col-lg-6">
                <h2 id="aboutHeadline" class="fw-bold mb-4 display-5">Loading...</h2>
                <div id="aboutDescription" class="lead text-muted mb-4">
                    <!-- Paragraphs populated by JS -->
                </div>
                <div class="mt-4">
                    <a href="/gallery.html" class="btn btn-gold btn-lg">View Our Work</a>
                </div>
            </div>
        </div>

        <div class="team-section pt-5">
            <h2 class="text-center fw-bold mb-5 display-4">Meet Our <span class="gold-text">Team</span></h2>
            <div class="row g-4 justify-content-center" id="teamGrid">
                <!-- Dynamically populated -->
            </div>
        </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
