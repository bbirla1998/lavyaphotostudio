<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Lavya Photo Studio</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        :root {
            --lamp-glow: #D4AF37;
            --lamp-shade: #333;
        }

        body {
            height: 100vh;
            background-color: #05070a; /* Darker for better contrast */
            display: flex;
            align-items: center;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            padding: 0 5%;
            transition: background 0.5s ease;
        }

        body.light-on {
            background-color: #0b0f1a;
        }

        /* --- Lamp Section --- */
        .lamp-area {
            width: 40%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .lamp-assembly {
            position: absolute;
            top: 20%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lamp-shade {
            width: 140px;
            height: 80px;
            background: var(--lamp-shade);
            border-radius: 80px 80px 20px 20px;
            position: relative;
            z-index: 10;
            transition: all 0.4s ease;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
            border: 2px solid rgba(212, 175, 55, 0.1);
        }

        .light-on .lamp-shade {
            background: #fff;
            box-shadow: 0 0 80px var(--lamp-glow), inset 0 0 10px rgba(0,0,0,0.1);
            border: 2px solid var(--accent-gold);
        }

        .lamp-stand {
            width: 6px;
            height: 120px;
            background: linear-gradient(to bottom, #555, #222);
            z-index: 5;
            border-radius: 4px;
        }

        .lamp-base {
            width: 100px;
            height: 25px;
            background: radial-gradient(circle, #444, #111);
            border-radius: 50%;
            margin-top: -10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Pull Chain (Rope) */
        .pull-chain {
            position: absolute;
            top: 80px;
            left: 50%;
            width: 3px;
            height: 70px;
            background: linear-gradient(to bottom, #888, #444);
            z-index: 15;
            cursor: pointer;
            transform-origin: top;
            transition: height 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pull-chain::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: -6px;
            width: 15px;
            height: 15px;
            background: var(--accent-gold);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* --- Login Card Section --- */
        .form-area {
            width: 40%;
            display: flex;
            justify-content: center;
            perspective: 1000px;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 50px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            opacity: 0;
            transform: rotateY(-20deg) scale(0.9) translateZ(-50px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .light-on .login-card {
            opacity: 1;
            transform: rotateY(0deg) scale(1) translateZ(0);
            pointer-events: auto;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15), 0 30px 60px rgba(0,0,0,0.6);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .back-home {
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
            margin-top: 25px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-home:hover {
            color: var(--accent-gold);
        }

        @media (max-width: 991px) {
            body {
                overflow-y: auto;
            }
            .main-container {
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 50px;
            }
            .lamp-area {
                height: 350px;
                width: 100%;
            }
            .form-area {
                width: 100%;
                padding-bottom: 50px;
            }
            .login-card {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="main-container">
        <!-- Lamp Area -->
        <div class="lamp-area">
            <div class="lamp-assembly">
                <div class="lamp-shade" id="lampShade"></div>
                <div class="lamp-stand"></div>
                <div class="lamp-base"></div>
                <div class="pull-chain" id="pullChain"></div>
            </div>
        </div>

        <!-- Form Area -->
        <div class="form-area">
            <div class="login-card text-center" id="loginCard">
                <h2 class="fw-bold gold-text mb-1 text-uppercase letter-spacing-2">Studio Admin</h2>
                <p class="text-muted small mb-5">Restricted Access Only</p>

                <form id="loginForm" class="text-start">
                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-gold btn-lg w-100 mb-3" id="loginBtn">Login</button>
                    <div id="error-msg" class="text-danger small text-center mb-0" style="display: none;">Invalid credentials.</div>
                </form>

                <a href="/" class="back-home small">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Authenticaton Logic (Preserved) ---
        fetch('/api/auth/check')
            .then(res => res.json())
            .then(data => {
                if (data.isAuthenticated) {
                    window.location.href = '/admin_dashboard.html';
                }
            });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('error-msg');

            btn.textContent = 'Authenticating...';
            errorMsg.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = '/admin_dashboard.html';
                } else {
                    errorMsg.textContent = data.error || 'Authentication failed.';
                    errorMsg.style.display = 'block';
                    btn.textContent = 'Login';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Try again.';
                errorMsg.style.display = 'block';
                btn.textContent = 'Login';
            }
        });

        // --- 2. Lamp Interactive Logic ---
        const pullChain = document.getElementById('pullChain');
        const body = document.body;
        let isDragging = false;
        let startY = 0;
        let baseHeight = 70;

        function startPull(y) {
            isDragging = true;
            startY = y;
            pullChain.style.transition = 'none';
        }

        function handlePull(y) {
            if (!isDragging) return;
            const delta = y - startY;
            if (delta > 0 && delta < 60) {
                pullChain.style.height = (baseHeight + delta) + 'px';
            }
        }

        function endPull(y) {
            if (!isDragging) return;
            isDragging = false;
            pullChain.style.transition = 'height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            
            const delta = y - startY;
            if (delta > 30) {
                toggleLight();
            }
            pullChain.style.height = baseHeight + 'px';
        }

        function toggleLight() {
            body.classList.toggle('light-on');
        }

        // Mouse Events
        pullChain.addEventListener('mousedown', e => startPull(e.clientY));
        document.addEventListener('mousemove', e => handlePull(e.clientY));
        document.addEventListener('mouseup', e => endPull(e.clientY));

        // Touch Events
        pullChain.addEventListener('touchstart', e => startPull(e.touches[0].clientY));
        document.addEventListener('touchmove', e => {
            if (isDragging) e.preventDefault();
            handlePull(e.touches[0].clientY);
        }, { passive: false });
        document.addEventListener('touchend', e => {
            if (isDragging) {
                const touchY = e.changedTouches[0].clientY;
                endPull(touchY);
            }
        });

        // Click event fallback
        pullChain.addEventListener('click', () => {
             if (Math.abs(startY - lastY) < 5) toggleLight();
        });
        
        let lastY = 0;
        document.addEventListener('mouseup', e => lastY = e.clientY);
    </script>
</body>

</html>
