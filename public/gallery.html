<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Lavya Photo Studio</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .filter-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--accent-gold);
            padding: 8px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all var(--transition-speed);
            font-weight: 500;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent-gold);
            color: var(--bg-color);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 1;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            border-color: var(--accent-gold);
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-speed);
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img,
        .lightbox video {
            max-width: 90%;
            max-height: 80vh;
            border: 2px solid var(--accent-gold);
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .close-lightbox {
            position: absolute;
            top: 40px;
            right: 40px;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            line-height: 1;
        }
    </style>
</head>

<body>

    <div id="navbar-placeholder"></div>

    <header class="page-header">
        <div class="container">
            <h1 class="display-3 fw-bold">Our <span class="gold-text">Portfolio</span></h1>
            <p class="text-muted lead">Explore our latest captured moments and stories.</p>
        </div>
    </header>

    <section class="section py-5">
        <div class="container">
        <div class="d-flex flex-wrap justify-content-center gap-3 mb-5" id="dynamicFilterBtns">
            <button class="filter-btn active" data-filter="all">All</button>
            <!-- Dynamically populated from API -->
        </div>

        <div class="row g-4" id="gallery-container">
            <!-- Dynamically populated -->
        </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="close-lightbox" id="close-lightbox">&times;</span>
        <div id="lightbox-container" class="container d-flex justify-content-center align-items-center h-100 w-100">
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
