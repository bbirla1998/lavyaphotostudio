<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers & Packages | Lavya Photo Studio</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .offer-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all var(--transition-speed);
        }

        .offer-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-gold);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .offer-img {
            height: 250px;
            background-color: #1a1a1a;
            background-size: cover;
            background-position: center;
        }

        .price-badge {
            display: inline-block;
            background: var(--accent-gold);
            color: #000;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.25rem;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>

<body>

    <div id="navbar-placeholder"></div>

    <header class="page-header">
        <div class="container">
            <h1 class="display-3 fw-bold">Special <span class="gold-text">Packages</span></h1>
            <p class="text-muted lead">Choose the perfect package for your unforgettable moments.</p>
        </div>
    </header>

    <section class="section py-5">
        <div class="container">
        <div class="row g-4 justify-content-center" id="offers-container">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-warning" role="status">
                    <span class="visually-hidden">Loading offers...</span>
                </div>
            </div>
        </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
