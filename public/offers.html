<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers & Packages | Lavya Photo Studio</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-header {
            padding: 150px 0 60px;
            text-align: center;
            background: linear-gradient(to bottom, var(--bg-color), var(--card-bg));
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            padding: 60px 0;
        }

        .offer-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s;
        }

        .offer-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .offer-img {
            height: 200px;
            background-color: #1a1a1a;
            background-size: cover;
            background-position: center;
        }

        .offer-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .price-badge {
            align-self: flex-start;
            background: var(--accent-gold);
            color: var(--bg-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .offer-title {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .offer-desc {
            color: var(--text-muted);
            margin-bottom: 30px;
            flex-grow: 1;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="/" class="nav-brand studio-name-display">Lavya Studio</a>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/services.html">Services</a></li>
            <li><a href="/gallery.html">Gallery</a></li>
            <li><a href="/offers.html" class="active">Offers</a></li>
            <li><a href="/about.html">About</a></li>
            <li><a href="/contact.html">Contact</a></li>
            <li><a href="/admin.html" title="Admin Portal" style="display:flex; align-items:center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-top:-2px;">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                        </path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                </a></li>
        </ul>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 style="font-size: 3rem;">Special <span class="gold-text">Packages</span></h1>
            <p class="text-muted">Choose the perfect package for your unforgettable moments.</p>
        </div>
    </header>

    <section class="container">
        <div class="offers-grid" id="offers-container">
            <!-- Dynamically populated from offers.json -->
            <div style="text-align: center; grid-column: 1/-1; padding: 50px;">
                <p>Loading offers...</p>
            </div>
        </div>
    </section>

    <!-- Minimal Footer -->
    <footer style="padding: 20px 0; text-align: center; border-top: 1px solid rgba(255,255,255,0.1);">
        &copy; <span id="year"></span> <span class="studio-name-display"></span>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        async function loadOffers() {
            try {
                const res = await fetch('/api/data/offers');
                const offers = await res.json();

                const container = document.getElementById('offers-container');
                container.innerHTML = '';

                if (!offers || offers.length === 0) {
                    container.innerHTML = '<p style="text-align:center; grid-column:1/-1;">No offers currently available.</p>';
                    return;
                }

                offers.forEach(offer => {
                    const card = document.createElement('div');
                    card.className = 'offer-card';

                    const imgStyle = offer.image ? `background-image: url('${offer.image}')` : '';

                    card.innerHTML = `
                        <div class="offer-img" style="${imgStyle}"></div>
                        <div class="offer-content">
                            <div class="price-badge">${offer.price}</div>
                            <h3 class="offer-title">${offer.title}</h3>
                            <p class="offer-desc">${offer.description}</p>
                            <a href="/contact.html?subject=Booking for ${encodeURIComponent(offer.title)}" class="btn" style="text-align:center;">Book This Package</a>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error("Error loading offers:", err);
            }
        }

        loadOffers();
    </script>
</body>

</html>
